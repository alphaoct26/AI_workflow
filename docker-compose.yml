version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: ecommerce_postgres
    restart: always
    environment:
      POSTGRES_DB: ecommerce
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build: .
    container_name: auto_analyst_app
    depends_on:
      - db
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/ecommerce
    volumes:
      - .:/app
    stdin_open: true  # Enables interactive input for the CLI chat
    tty: true         # Allocates pseudo-TTY to keep interactive prompt stable

volumes:
  postgres_data:
